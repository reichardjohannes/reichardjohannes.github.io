document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

vailability dot only — no decorative color<\u002Fli>\n          <li>No illustrations · numbered index in every section<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"system-card\">\n        <h3><span class=\"ix\">/04<\u002Fspan> Sections — MUST / HIGH / SKIP<\u002Fh3>\n        <div class=\"priority-list\">\n          <div class=\"row-p must\"><span class=\"dot-p\"><\u002Fspan><b>MUST<\u002Fb> · Hero · Work · Contact<\u002Fdiv>\n          <div class=\"row-p must\"><span class=\"dot-p\"><\u002Fspan><b>MUST<\u002Fb> · Case Study Detail Page<\u002Fdiv>\n          <div class=\"row-p high\"><span class=\"dot-p\"><\u002Fspan><b>HIGH<\u002Fb> · Process · About<\u002Fdiv>\n          <div class=\"row-p high\"><span class=\"dot-p\"><\u002Fspan><b>HIGH<\u002Fb> · Selected Clients<\u002Fdiv>\n          <div class=\"row-p med\"><span class=\"dot-p\"><\u002Fspan><b>NICE<\u002Fb> · Now / Currently<\u002Fdiv>\n          <div class=\"row-p med\"><span class=\"dot-p\"><\u002Fspan><b>NICE<\u002Fb> · Skills cluster<\u002Fdiv>\n          <div class=\"row-p skip\"><span class=\"dot-p\"><\u002Fspan><b>SKIP<\u002Fb> · Blog · Testimonials block · FAQ · Contact form<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"system-card\">\n        <h3><span class=\"ix\">/05<\u002Fspan> Recruiter User Flow<\u002Fh3>\n        <div class=\"flow\">\n          <span class=\"flow-box\">Land<\u002Fspan><span class=\"flow-arr\">→<\u002Fspan>\n          <span class=\"flow-box\">Read hero<\u002Fspan><span class=\"flow-arr\">→<\u002Fspan>\n          <span class=\"flow-box\">Scan work<\u002Fspan><span class=\"flow-arr\">→<\u002Fspan>\n          <span class=\"flow-box\">Open case<\u002Fspan><span class=\"flow-arr\">→<\u002Fspan>\n          <span class=\"flow-box\">Skim process<\u002Fspan><span class=\"flow-arr\">→<\u002Fspan>\n          <span class=\"flow-box end\">Email<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"muted\" style=\"font-size:11.5px;margin-top:12px;line-height:1.55\">\n          Target time-to-contact: <b style=\"color:var(--ink)\">&lt; 90 seconds<\u002Fb>.\n          Every section must survive a scan.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid-2\">\n      <div class=\"system-card\">\n        <h3><span class=\"ix\">/06<\u002Fspan> Selected Clients (real names)<\u002Fh3>\n        <p class=\"muted\" style=\"margin-bottom:12px\">Surface these as logos/wordmarks on the home page — they do heavy lifting for trust.<\u002Fp>\n        <div class=\"client-row\">\n          <span class=\"client-chip\">SCHUNK<\u002Fspan>\n          <span class=\"client-chip\">INDEX-TRAUB<\u002Fspan>\n          <span class=\"client-chip\">FANUC<\u002Fspan>\n          <span class=\"client-chip\">TITAN WAGNER<\u002Fspan>\n          <span class=\"client-chip\">ENERCON<\u002Fspan>\n          <span class=\"client-chip\">MAPAL<\u002Fspan>\n          <span class=\"client-chip muted\">+ further<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"label-mono\" style=\"margin-top:14px\">Domain · B2B · Industrial · SAP Commerce · Fleet &amp; Machine Platforms<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"system-card\">\n        <h3><span class=\"ix\">/07<\u002Fspan> Process Spine (Phase 0 → Delivery)<\u002Fh3>\n        <p class=\"muted\" style=\"margin-bottom:12px\">Use this same six-step spine on the home Process section <i>and<\u002Fi> as the narrative for case studies.<\u002Fp>\n        <div class=\"flow\" style=\"gap:6px\">\n          <span class=\"flow-box\">00 · Phase 0<\u002Fspan><span class=\"flow-arr\">→<\u002Fspan>\n          <span class=\"flow-box\">01 · Research<\u002Fspan><span class=\"flow-arr\">→<\u002Fspan>\n          <span class=\"flow-box\">02 · Workshops<\u002Fspan><span class=\"flow-arr\">→<\u002Fspan>\n          <span class=\"flow-box\">03 · Wireframes<\u002Fspan><span class=\"flow-arr\">→<\u002Fspan>\n          <span class=\"flow-box\">04 · Testing<\u002Fspan><span class=\"flow-arr\">→<\u002Fspan>\n          <span class=\"flow-box\">05 · Scrum / Dev<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n\n  <!-- ====================== STYLE GUIDE ====================== -->\n  <section class=\"page\" data-tab-panel=\"style\" data-screen-label=\"01 Style Guide\">\n\n    <div class=\"page-head\">\n      <div>\n        <h1>Style Guide · Visual System<\u002Fh1>\n        <div class=\"sub\">01 · The vocabulary that runs through every wireframe<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pill-row\">\n        <span class=\"pill outline\">Swiss Functional<\u002Fspan>\n        <span class=\"pill outline\">Lo-Fi → Hi-Fi ready<\u002Fspan>\n        <span class=\"pill dark\">v0.1 Draft<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ 01 · FOUNDATIONS ============ -->\n    <div class=\"col-label\" style=\"margin-bottom:14px\">/01 · Foundations · Voice<\u002Fdiv>\n    <div class=\"grid-2\" style=\"margin-bottom:32px\">\n      <div class=\"system-card\">\n        <h3><span class=\"ix\">/01.1<\u002Fspan> Design Principles<\u002Fh3>\n        <ul>\n          <li><b>Structure before aesthetics.<\u002Fb> Hierarchy first, polish second<\u002Fli>\n          <li><b>Earn every element.<\u002Fb> No filler, no slop, no decorative noise<\u002Fli>\n          <li><b>Type carries the weight.<\u002Fb> Imagery supports — never compensates<\u002Fli>\n          <li><b>One accent only.<\u002Fb> Color signals state, not style<\u002Fli>\n          <li><b>Numbered, not bulleted.<\u002Fb> Index everything · /01 · /02 · /03<\u002Fli>\n          <li><b>Mono for metadata.<\u002Fb> Sans for ideas, mono for measurements<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"system-card\">\n        <h3><span class=\"ix\">/01.2<\u002Fspan> Voice &amp; Tone<\u002Fh3>\n        <p class=\"muted\" style=\"margin-bottom:10px\">English. Senior, direct, never marketing-y. German UI conventions translated into Swiss-modern English.<\u002Fp>\n        <div class=\"stack-sm\">\n          <div>\n            <div class=\"label-mono\" style=\"color:var(--ok)\">Do<\u002Fdiv>\n            <p style=\"font-size:12px;color:var(--ink);line-height:1.55\">“Single sign-on, single portal. Support tickets down 34%.”<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"border-top:1px dashed var(--rule);padding-top:10px\">\n            <div class=\"label-mono\" style=\"color:var(--warn)\">Don't<\u002Fdiv>\n            <p style=\"font-size:12px;color:var(--ink-3);line-height:1.55\">“I had the privilege to leverage cross-functional synergies and ideate truly delightful experiences …”<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"label-mono\" style=\"margin-top:14px\">Rules<\u002Fdiv>\n        <ul>\n          <li>Active voice · past tense for case studies<\u002Fli>\n          <li>Numbers as digits (6 years · 23 issues · 89%)<\u002Fli>\n          <li>Em dash for asides — sparingly<\u002Fli>\n          <li>No emoji · no exclamation marks<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ 02 · COLOR ============ -->\n    <div class=\"col-label\" style=\"margin-bottom:14px\">/02 · Color<\u002Fdiv>\n    <div class=\"system-card\" style=\"margin-bottom:32px\">\n      <h3 style=\"margin-bottom:14px\"><span class=\"ix\">/02.1<\u002Fspan> Palette<\u002Fh3>\n      <p class=\"muted\" style=\"margin-bottom:18px\">Five neutrals · one accent. Off-white paper, near-black ink, four grays for hierarchy. Green dot for availability state only.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(6,1fr);gap:14px\">\n        <div>\n          <div style=\"background:#f5f4f2;height:88px;border:1px solid var(--rule);border-radius:3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Paper<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#f5f4f2<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Page background<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background:#fff;height:88px;border:1px solid var(--rule);border-radius:3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Card<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#ffffff<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Surface · cards<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background:#1a1a1a;height:88px;border-radius:3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Ink<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#1a1a1a<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Primary text<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background:#555;height:88px;border-radius:3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Ink 2<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#555555<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Body · secondary<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background:#888;height:88px;border-radius:3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Ink 3<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#888888<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Mono labels<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background:#bbb;height:88px;border-radius:3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Ink 4<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#bbbbbb<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Hairlines · numerals<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:1px;background:var(--rule);margin:22px 0\"><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(6,1fr);gap:14px\">\n        <div>\n          <div style=\"background:#e0ddd8;height:64px;border-radius:3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Rule<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#e0ddd8<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Dividers<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background:#e8e7e4;height:64px;border-radius:3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Box<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#e8e7e4<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Wireframe boxes<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background:#efeeea;height:64px;border-radius:3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Tag<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#efeeea<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Pills · chips<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background: rgb(65, 211, 147); height: 64px; border-radius: 3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">OK · Accent<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#3fa663<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Availability dot<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background: rgb(166, 107, 87); height: 64px; border-radius: 3px\"><\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Warn<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--ink-2);margin-top:2px\">#c08a3b<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px\">Annotations only<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"grid-column:span 1\">\n          <div style=\"height:64px;border:1px dashed var(--rule);border-radius:3px;display:flex;align-items:center;justify-content:center\">\n            <span class=\"label-mono\" style=\"color:var(--ink-4)\">No other colors<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:8px\">Rule<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px;margin-top:2px\">No gradients · no brand color · no per-section accents<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ 03 · TYPOGRAPHY ============ -->\n    <div class=\"col-label\" style=\"margin-bottom:14px\">/03 · Typography<\u002Fdiv>\n    <div class=\"system-card\" style=\"margin-bottom:32px\">\n      <h3 style=\"margin-bottom:14px\"><span class=\"ix\">/03.1<\u002Fspan> Type Families<\u002Fh3>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px\">\n        <div style=\"padding:18px;border:1px solid var(--rule);border-radius:3px\">\n          <div class=\"label-mono\">Sans · Body &amp; Headings<\u002Fdiv>\n          <div style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:36px;font-weight:500;letter-spacing:-.01em;margin-top:14px;line-height:1\">Helvetica Neue<\u002Fdiv>\n          <div style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;color:var(--ink-2);margin-top:10px;line-height:1.5\">Fallback: Helvetica, Arial, system-ui. For production, license Neue Haas Grotesk if budget allows — otherwise stick with Helvetica. Avoid Inter, Roboto, generic geometric sans.<\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:14px;color:var(--ink-2)\">Weights · 400 · 500 · 600<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:18px;border:1px solid var(--rule);border-radius:3px\">\n          <div class=\"label-mono\">Mono · Labels &amp; Metadata<\u002Fdiv>\n          <div style=\"font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:34px;font-weight:500;margin-top:14px;line-height:1\">ui-monospace<\u002Fdiv>\n          <div style=\"font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:12px;color:var(--ink-2);margin-top:10px;line-height:1.5\">System mono stack. For production, JetBrains Mono or IBM Plex Mono via Google Fonts is a safe upgrade.<\u002Fdiv>\n          <div class=\"label-mono\" style=\"margin-top:14px;color:var(--ink-2)\">Used for · /index · YEAR · TAGS · /role · timestamps<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"height:1px;background:var(--rule);margin:22px 0\"><\u002Fdiv>\n      <h3 style=\"margin-bottom:14px\"><span class=\"ix\">/03.2<\u002Fspan> Type Scale<\u002Fh3>\n      <div style=\"display:flex;flex-direction:column;gap:0;border-top:1px solid var(--rule)\">\n        <div style=\"display:grid;grid-template-columns:140px 1fr 220px;gap:18px;align-items:baseline;padding:14px 0;border-bottom:1px solid var(--rule)\">\n          <span class=\"label-mono\">Display · 56/56<\u002Fspan>\n          <span style=\"font-size:56px;line-height:1;font-weight:500;letter-spacing:-.02em\">Designing complex platforms.<\u002Fspan>\n          <span class=\"label-mono\" style=\"color:var(--ink-2);text-transform:none;letter-spacing:.04em\">Hero · Editorial home only<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:140px 1fr 220px;gap:18px;align-items:baseline;padding:14px 0;border-bottom:1px solid var(--rule)\">\n          <span class=\"label-mono\">H1 · 34/38<\u002Fspan>\n          <span style=\"font-size:34px;line-height:1.1;font-weight:500;letter-spacing:-.015em\">Case Study · Schunk · Portal &amp; eShop<\u002Fspan>\n          <span class=\"label-mono\" style=\"color:var(--ink-2);text-transform:none;letter-spacing:.04em\">Case hero · section openers<\u002Fspan>\n \n              <span class=\"ri-arr\">→<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"row-item\">\n              <span class=\"ri-ix\">/06<\u002Fspan>\n              <div><div class=\"ri-name\">B2B Quoting &amp; CPQ Flow<\u002Fdiv><div class=\"ri-client\">Titan Wagner · Sales<\u002Fdiv><\u002Fdiv>\n              <span class=\"ri-meta\">2021<\u002Fspan>\n              <span class=\"ri-arr\">→<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"notes\" style=\"margin-top:24px\">\n          <div class=\"note\">\n            <div class=\"note-h must\">Sticky Left Column<\u002Fdiv>\n            <div class=\"note-line\">All \"about\" content lives here · no separate About section<\u002Fdiv>\n            <div class=\"note-line\">Bio · Stats · Stack · Availability dot<\u002Fdiv>\n            <div class=\"note-line\">On scroll, this stays fixed; right column does all the moving<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"note\">\n            <div class=\"note-h must\">Right Column<\u002Fdiv>\n            <div class=\"note-line\">Pure work index — every row is a case study<\u002Fdiv>\n            <div class=\"note-line\">Hover lifts the row + shows a small thumbnail<\u002Fdiv>\n            <div class=\"note-line\">Order &amp; categorize visually with metadata only · no headers<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"note\">\n            <div class=\"note-h tip\">Process &amp; Contact<\u002Fdiv>\n            <div class=\"note-line\">Below the split, full-width: Process spine + Contact<\u002Fdiv>\n            <div class=\"note-line\">Sticky column releases once Process begins<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"note\">\n            <div class=\"note-h tip\">Mobile Fallback<\u002Fdiv>\n            <div class=\"note-line\">Bio block collapses to top · work list stacks below · sticky drops away<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"col-label\">Rationale<\u002Fdiv>\n        <div class=\"ration\">\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Why split-screen<\u002Fdiv>\n            <p>Solves the \"recruiter never scrolls past hero\" problem: <b>your bio is always visible<\u002Fb> while they browse work.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Trade-offs<\u002Fdiv>\n            <p>Less canonical — riskier for very traditional reviewers. Constrains hero typography (no big editorial headline).<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Closest reference<\u002Fdiv>\n            <p>Bureau Borsche site · Read.cv profiles · Sidebar.io author pages<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\" style=\"background:#fafaf8\">\n            <div class=\"ration-h\">Best fit if you…<\u002Fdiv>\n            <p>… want the <b>strongest signal-to-noise<\u002Fb> for senior recruiters: bio + work + availability all in one viewport.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Open questions<\u002Fdiv>\n            <p class=\"muted\">— Headshot or no headshot in left column?<\u002Fp>\n            <p class=\"muted\">— Show clients as wordmarks below bio, or only on case pages?<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ====================== CASE A · STICKY SCROLL ====================== -->\n  <section class=\"page\" data-tab-panel=\"case-a\" data-screen-label=\"A Case Sticky Scroll\">\n    <div class=\"page-head\">\n      <div>\n        <h1>Case Study · A — Sticky Scroll<\u002Fh1>\n        <div class=\"sub\">Image stays · narrative scrolls · refined from your existing wireframe<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pill-row\">\n        <span class=\"pill outline\">Narrative<\u002Fspan>\n        <span class=\"pill outline\">Long-form<\u002Fspan>\n        <span class=\"pill dark\">Recommended for deep dives<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"layout-2\">\n      <div>\n        <div class=\"col-label\">Interactive · Scroll the right column or click sections<\u002Fdiv>\n\n        <div class=\"demo-wrap\">\n          <div class=\"demo-head\">\n            <div>\n              <div class=\"demo-title\">Schunk · Portal &amp; eShop<\u002Fdiv>\n              <div class=\"demo-sub\">End-to-end UX · Portal · eShop · Machine Management · 2024<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"pill-row\">\n              <span class=\"pill outline\">Case Study<\u002Fspan>\n              <span class=\"pill dark\">Sticky<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"progress-bar\"><div class=\"progress-fill\" id=\"prog\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"demo-body\">\n\n            <div class=\"demo-left\" id=\"imgCol\">\n              <div class=\"img-panel visible\" id=\"p1\">\n                <div class=\"img-box\" style=\"width:80%;height:200px\">Expert Review<br>Heuristic Evaluation<\u002Fdiv>\n                <div class=\"label-mono\" style=\"margin-top:10px;text-align:center\">Existing eShop · 23 Pain Points<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"img-panel\" id=\"p2\">\n                <div class=\"img-box\" style=\"width:80%;height:200px\">Personas · Journey Map<br>Buyer · Admin · Technician<\u002Fdiv>\n                <div class=\"label-mono\" style=\"margin-top:10px;text-align:center\">3 Personas · 1 Journey Map<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"img-panel\" id=\"p3\">\n                <div class=\"img-box\" style=\"width:80%;height:200px\">Balsamiq Wireframes<br>Portal Navigation<\u002Fdiv>\n                <div class=\"label-mono\" style=\"margin-top:10px;text-align:center\">3 Review Rounds<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"img-panel\" id=\"p4\">\n                <div class=\"img-box\" style=\"width:80%;height:200px\">Usability Test Protocol<br>Task Completion %<\u002Fdiv>\n                <div class=\"label-mono\" style=\"margin-top:10px;text-align:center\">8 Participants · Moderated<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"img-panel\" id=\"p5\">\n                <div class=\"img-box\" style=\"width:80%;height:200px\">Final Design · Sketch<br>Portal Dashboard<\u002Fdiv>\n                <div class=\"label-mono\" style=\"margin-top:10px;text-align:center\">Hi-Fi · Component Library<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"img-panel\" id=\"p6\">\n                <div class=\"img-box\" style=\"width:80%;height:200px;background:#e3e8e0\">Outcome &amp; Client Quote<\u002Fdiv>\n                <div class=\"label-mono\" style=\"margin-top:10px;text-align:center;color:var(--ok)\">Accepted · Live since 2024<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"demo-right\" id=\"scrollCol\">\n              <div class=\"scroll-section active\" data-panel=\"1\" data-prog=\"16\">\n                <div class=\"ss-num\">/01 · EXPERT REVIEW<\u002Fdiv>\n                <div class=\"ss-title\">Audit the Status Quo<\u002Fdiv>\n                <div class=\"ss-text\">Heuristic evaluation of the existing eShop. 23 critical usability issues mapped to severity and effort. Becomes the baseline for every later decision.<\u002Fdiv>\n                <div class=\"ss-tags\"><span class=\"ss-tag\">Heuristic Eval.<\u002Fspan><span class=\"ss-tag\">Pain Points<\u002Fspan><\u002Fdiv>\n                <div class=\"ss-art\">Artifact · Audit document (PDF)<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"scroll-section\" data-panel=\"2\" data-prog=\"33\">\n                <div class=\"ss-num\">/02 · RESEARCH<\u002Fdiv>\n                <div class=\"ss-title\">Understand who the users actually are<\u002Fdiv>\n                <div class=\"ss-text\">Stakeholder workshops with PO &amp; PL. Three personas — Buyer, Machine Admin, Service Technician. User journey map surfaces the breaks in the existing flow.<\u002Fdiv>\n                <div class=\"ss-tags\"><span class=\"ss-tag\">Personas<\u002Fspan><span class=\"ss-tag\">Journey Map<\u002Fspan><span class=\"ss-tag\">Workshops<\u002Fspan><\u002Fdiv>\n                <div class=\"ss-art\">Artifact · Personas · Journey Maps<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"scroll-section\" data-panel=\"3\" data-prog=\"50\">\n                <div class=\"ss-num\">/03 · WIREFRAMES<\u002Fdiv>\n                <div class=\"ss-title\">Structure before aesthetics<\u002Fdiv>\n                <div class=\"ss-text\">Iterative wireframes in Balsamiq. Three internal review rounds. Every decision argued — never decorative. The point is to ship the right structure, not the prettiest one.<\u002Fdiv>\n                <div class=\"ss-tags\"><span class=\"ss-tag\">Balsamiq<\u002Fspan><span class=\"ss-tag\">Review Cycles<\u002Fspan><\u002Fdiv>\n                <div class=\"ss-art\">Artifact · Wireframe PDFs<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"scroll-section\" data-panel=\"4\" data-prog=\"66\">\n                <div class=\"ss-num\">/04 · TESTING<\u002Fdiv>\n                <div class=\"ss-title\">Validate, don't assume<\u002Fdiv>\n                <div class=\"ss-text\">Moderated usability tests with real users on the wireframes. Findings feed straight into the next iteration. No design is shipped without a test as evidence.<\u002Fdiv>\n                <div class=\"ss-tags\"><span class=\"ss-tag\">Usability Test<\u002Fspan><span class=\"ss-tag\">Iteration<\u002Fspan><\u002Fdiv>\n                <div class=\"ss-art\">Artifact · Test protocols<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"scroll-section\" data-panel=\"5\" data-prog=\"83\">\n                <div class=\"ss-num\">/05 · FINAL DESIGN &amp; SCRUM<\u002Fdiv>\n                <div class=\"ss-title\">From Sketch to sprints<\u002Fdiv>\n                <div class=\"ss-text\">Final design in Sketch, client sign-off, handover to an interdisciplinary dev team (internal + external). Two-week sprints, continuous quality assurance through release.<\u002Fdiv>\n                <div class=\"ss-tags\"><span class=\"ss-tag\">Sketch<\u002Fspan><span class=\"ss-tag\">Scrum<\u002Fspan><span class=\"ss-tag\">Handoff<\u002Fspan><\u002Fdiv>\n                <div class=\"ss-art\">Artifact · Final Hi-Fi screens<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"scroll-section\" data-panel=\"6\" data-prog=\"100\">\n                <div class=\"ss-num\">/06 · OUTCOME<\u002Fdiv>\n                <div class=\"ss-title\">What it changed<\u002Fdiv>\n                <div class=\"ss-text\">Users now sign in once and manage everything in one place — eShop, registered machines, service, benefits. Customer feedback and PO/PL sign-off confirmed the shift.<\u002Fdiv>\n                <div class=\"ss-tags\"><span class=\"ss-tag\">Sign-off<\u002Fspan><span class=\"ss-tag\">Client Feedback<\u002Fspan><\u002Fdiv>\n                <div class=\"ss-art\">\"More usable, and faster to the point.\" — Client PO<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"col-label\">Pattern Notes<\u002Fdiv>\n        <div class=\"ration\">\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Sticky scroll<\u002Fdiv>\n            <p>Left frame holds the artifact, right column scrolls the narrative. Image switches per section with a fade.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Why this works<\u002Fdiv>\n            <ul style=\"font-size:11.5px;color:var(--ink-2);line-height:1.6;list-style:none\">\n              <li>· Visual context never disappears<\u002Fli>\n              <li>· Artifacts get <b>explained<\u002Fb>, not just shown<\u002Fli>\n              <li>· Reads as process — not a screen dump<\u002Fli>\n              <li>· Feels narrative · holds attention<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Mobile<\u002Fdiv>\n            <p>Sticky drops away. Image and text stack per section.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\" style=\"background:#fafaf8\">\n            <div class=\"ration-h\">Use this for<\u002Fdiv>\n            <p>Your <b>tentpole<\u002Fb> case — Schunk or Index-Traub. The one where the depth of process is the point.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ====================== CASE B · PHASED TIMELINE ====================== -->\n  <section class=\"page\" data-tab-panel=\"case-b\" data-screen-label=\"B Case Phased Timeline\">\n    <div class=\"page-head\">\n      <div>\n        <h1>Case Study · B — Phased Timeline<\u002Fh1>\n        <div class=\"sub\">Vertical timeline · One block per phase · Scannable<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pill-row\">\n        <span class=\"pill outline\">Scannable<\u002Fspan>\n        <span class=\"pill outline\">Process-forward<\u002Fspan>\n        <span class=\"pill outline\">Linear<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"layout-2\">\n      <div>\n        <div class=\"col-label\">Page Sketch · Vertical Timeline<\u002Fdiv>\n\n        <div class=\"wf\">\n          <div class=\"wf-h\"><span class=\"wf-name\">Case Hero · Schunk · Portal &amp; eShop<\u002Fspan><span class=\"wf-tag must\">Must<\u002Fspan><\u002Fdiv>\n          <div class=\"wf-body\" style=\"padding:18px 22px\">\n            <div class=\"editorial-meta\" style=\"margin-bottom:14px\">\n              <span>· Client · Schunk<\u002Fspan>\n              <span>· Role · Lead UX<\u002Fspan>\n              <span>· Year · 2024<\u002Fspan>\n              <span>· Duration · 9 months<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"b dark h22 w80\" style=\"margin-bottom:4px\"><\u002Fdiv>\n            <div class=\"b dark h22 w60\" style=\"margin-bottom:10px\"><\u002Fdiv>\n            <div class=\"b w70 h8\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"wf\" style=\"margin-top:14px\">\n          <div class=\"wf-h\"><span class=\"wf-name\">Challenge &amp; Goals<\u002Fspan><span class=\"wf-tag must\">Must<\u002Fspan><\u002Fdiv>\n          <div class=\"wf-body\" style=\"padding:14px 22px\">\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n              <div>\n                <div class=\"label-mono\">Challenge<\u002Fdiv>\n                <p style=\"font-size:11.5px;color:var(--ink-2);line-height:1.55;margin-top:5px\">\n                  Customers managed eShop, machine fleet, service and benefits across <b>four disconnected systems<\u002Fb>. SAP backend, fragmented frontends.\n                <\u002Fp>\n              <\u002Fdiv>\n              <div>\n                <div class=\"label-mono\">Goals<\u002Fdiv>\n                <p style=\"font-size:11.5px;color:var(--ink-2);line-height:1.55;margin-top:5px\">\n                  Single sign-on, single portal · faster service requests · reduce support tickets by 30% within 6 months of launch.\n                <\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"col-label\" style=\"margin-top:18px\">Process Timeline<\u002Fdiv>\n\n        <div class=\"tl\">\n          <div class=\"tl-phase\">\n            <div class=\"tl-marker\"><span class=\"mk\"><\u002Fspan><span class=\"ix\">2024 · Q1<\u002Fspan><\u002Fdiv>\n            <div class=\"tl-body\">\n              <div class=\"tl-head\"><div class=\"tl-name\">Phase 0 · Workshops &amp; Alignment<\u002Fdiv><div class=\"tl-meta\">/00 · 3 weeks<\u002Fdiv><\u002Fdiv>\n              <div class=\"tl-text\">Two-day kickoff with PO, PL and key business stakeholders. Aligned on success metrics before any design work began. Set up bi-weekly review rhythm with the dev lead.<\u002Fdiv>\n              <div class=\"tl-tags\"><span class=\"ss-tag\">Workshops<\u002Fspan><span class=\"ss-tag\">Stakeholder Map<\u002Fspan><span class=\"ss-tag\">Success Metrics<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"tl-phase\">\n            <div class=\"tl-marker\"><span class=\"mk\"><\u002Fspan><span class=\"ix\">Q1<\u002Fspan><\u002Fdiv>\n            <div class=\"tl-body\">\n              <div class=\"tl-head\"><div class=\"tl-name\">Research &amp; Expert Review<\u002Fdiv><div class=\"tl-meta\">/01 · 4 weeks<\u002Fdiv><\u002Fdiv>\n              <div class=\"tl-text\">Heuristic evaluation of existing eShop. 8 user interviews across Buyer / Admin / Technician personas. Output: pain-point map and 3 user-journey maps.<\u002Fdiv>\n              <div class=\"tl-artifacts\">\n                <div class=\"img-box\">Audit doc<\u002Fdiv>\n                <div class=\"img-box\">Persona sheets<\u002Fdiv>\n                <div class=\"img-box\">Journey map<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"tl-tags\"><span class=\"ss-tag\">Heuristic Eval.<\u002Fspan><span class=\"ss-tag\">User Interviews<\u002Fspan><span class=\"ss-tag\">Personas<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"tl-phase\">\n            <div class=\"tl-marker\"><span class=\"mk\"><\u002Fspan><span class=\"ix\">Q2<\u002Fspan><\u002Fdiv>\n            <div class=\"tl-body\">\n              <div class=\"tl-head\"><div class=\"tl-name\">Wireframes &amp; Information Architecture<\u002Fdiv><div class=\"tl-meta\">/02 · 5 weeks<\u002Fdiv><\u002Fdiv>\n              <div class=\"tl-text\">Three iterations in Balsamiq. Site map collapsed from 11 to 6 top-level areas. Each wireframe set reviewed with PO before next round.<\u002Fdiv>\n              <div class=\"tl-artifacts\">\n                <div class=\"img-box\">Sitemap<\u002Fdiv>\n                <div class=\"img-box\">WF v1<\u002Fdiv>\n                <div class=\"img-box\">WF v3<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"tl-tags\"><span class=\"ss-tag\">Balsamiq<\u002Fspan><span class=\"ss-tag\">IA<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"tl-phase\">\n            <div class=\"tl-marker\"><span class=\"mk\"><\u002Fspan><span class=\"ix\">Q2<\u002Fspan><\u002Fdiv>\n            <div class=\"tl-body\">\n              <div class=\"tl-head\"><div class=\"tl-name\">Usability Testing<\u002Fdiv><div class=\"tl-meta\">/03 · 2 weeks<\u002Fdiv><\u002Fdiv>\n              <div class=\"tl-text\">Moderated tests with 8 real users on the v3 wireframes. Task completion rose from 62% to 89% by the end of the iteration cycle.<\u002Fdiv>\n              <div class=\"tl-tags\"><span class=\"ss-tag\">Moderated Tests<\u002Fspan><span class=\"ss-tag\">Task Completion<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"tl-phase\">\n            <div class=\"tl-marker\"><span class=\"mk\"><\u002Fspan><span class=\"ix\">Q3<\u002Fspan><\u002Fdiv>\n            <div class=\"tl-body\">\n              <div class=\"tl-head\"><div class=\"tl-name\">Hi-Fi Design &amp; Component Library<\u002Fdiv><div class=\"tl-meta\">/04 · 6 weeks<\u002Fdiv><\u002Fdiv>\n              <div class=\"tl-text\">Final design in Sketch. Component library aligned with internal SAP UI conventions. Co-design sessions with two developers ensured handoff parity.<\u002Fdiv>\n              <div class=\"tl-artifacts\">\n                <div class=\"img-box\">Dashboard<\u002Fdiv>\n                <div class=\"img-box\">Machine list<\u002Fdiv>\n                <div class=\"img-box\">Service flow<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"tl-tags\"><span class=\"ss-tag\">Sketch<\u002Fspan><span class=\"ss-tag\">Design System<\u002Fspan><span class=\"ss-tag\">Co-design<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"tl-phase\">\n            <div class=\"tl-marker\"><span class=\"mk\"><\u002Fspan><span class=\"ix\">Q4<\u002Fspan><\u002Fdiv>\n            <div class=\"tl-body\">\n              <div class=\"tl-head\"><div class=\"tl-name\">Delivery · Scrum Sprints<\u002Fdiv><div class=\"tl-meta\">/05 · 14 weeks<\u002Fdiv><\u002Fdiv>\n              <div class=\"tl-text\">Two-week sprints with internal + external developers. Acted as embedded UX in standups, refinements and reviews. Continuous QA on staging environment until acceptance.<\u002Fdiv>\n              <div class=\"tl-tags\"><span class=\"ss-tag\">Scrum<\u002Fspan><span class=\"ss-tag\">QA<\u002Fspan><span class=\"ss-tag\">Embedded<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"wf\" style=\"margin-top:14px\">\n          <div class=\"wf-h\"><span class=\"wf-name\">Outcome<\u002Fspan><span class=\"wf-tag high\">High<\u002Fspan><\u002Fdiv>\n          <div class=\"wf-body\" style=\"padding:18px 22px\">\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px\">\n              <div><div class=\"label-mono\">Support tickets<\u002Fdiv><div style=\"font-size:22px;font-weight:600;margin-top:4px\">−34%<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">vs. baseline · 6mo post-launch<\u002Fdiv><\u002Fdiv>\n              <div><div class=\"label-mono\">Task completion<\u002Fdiv><div style=\"font-size:22px;font-weight:600;margin-top:4px\">+27pp<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">tested vs. legacy flow<\u002Fdiv><\u002Fdiv>\n              <div><div class=\"label-mono\">Time-on-task<\u002Fdiv><div style=\"font-size:22px;font-weight:600;margin-top:4px\">−41%<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">order placement<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"quote\" style=\"font-size:15px\">\n              Users now sign in once and manage everything in one place.\n              <cite>— Client PO, sign-off review<\u002Fcite>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"col-label\">Pattern Notes<\u002Fdiv>\n        <div class=\"ration\">\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Why timeline<\u002Fdiv>\n            <p>Best for cases where the <b>sequence and time investment<\u002Fb> matter — proves senior-level project management as well as design.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Cadence<\u002Fdiv>\n            <p>Each phase has the same anatomy: name · duration · paragraph · 3 artifacts · tags. Predictable scan.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">When to skip<\u002Fdiv>\n            <p>If a project was short (≤ 6 weeks) — timeline feels overstuffed. Use C · Decision Log instead.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\" style=\"background:#fafaf8\">\n            <div class=\"ration-h\">Use this for<\u002Fdiv>\n            <p>Long, multi-quarter projects · Index-Traub · Schunk · Enercon<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Numbers (real or null)<\u002Fdiv>\n            <p class=\"muted\" style=\"font-size:11.5px\">If you don't have hard metrics for every project, swap the outcome block for the <b>client quote treatment<\u002Fb>. Don't fabricate numbers.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ====================== CASE C · DECISION LOG ====================== -->\n  <section class=\"page\" data-tab-panel=\"case-c\" data-screen-label=\"C Case Decision Log\">\n    <div class=\"page-head\">\n      <div>\n        <h1>Case Study · C — Decision Log<\u002Fh1>\n        <div class=\"sub\">Problem → Decision → Outcome · Narrative cards · Senior-thinking on display<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pill-row\">\n        <span class=\"pill outline\">Argument-driven<\u002Fspan>\n        <span class=\"pill outline\">Short<\u002Fspan>\n        <span class=\"pill outline\">Most senior-feeling<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"layout-2\">\n      <div>\n        <div class=\"col-label\">Page Sketch · Card Sequence<\u002Fdiv>\n\n        <div class=\"wf\">\n          <div class=\"wf-h\"><span class=\"wf-name\">Case Hero · Index-Traub · Machine Management<\u002Fspan><span class=\"wf-tag must\">Must<\u002Fspan><\u002Fdiv>\n          <div class=\"wf-body\" style=\"padding:18px 22px\">\n            <div class=\"editorial-meta\" style=\"margin-bottom:12px\">\n              <span>· Client · Index-Traub<\u002Fspan>\n              <span>· Role · Lead UX &amp; Workshop Lead<\u002Fspan>\n              <span>· Year · 2023<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"b dark h22 w80\" style=\"margin-bottom:4px\"><\u002Fdiv>\n            <div class=\"b dark h22 w55\" style=\"margin-bottom:10px\"><\u002Fdiv>\n            <p class=\"muted\" style=\"font-size:12px;line-height:1.55;max-width:54ch\">\n              A platform for managing global machine fleets — registered installs, service contracts, spare parts, technician access. The interesting part wasn't the screens; it was the <b>five decisions<\u002Fb> we had to argue our way through.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"col-label\" style=\"margin-top:18px\">Five Decisions<\u002Fdiv>\n\n        <div class=\"dlog\">\n          <div class=\"dcard\">\n            <div class=\"dcard-h\">\n              <span class=\"dcard-ix\">/01<\u002Fspan>\n              <span class=\"dcard-name\">Group by machine, not by order<\u002Fspan>\n              <span class=\"dcard-tag\">IA<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"dcard-body\">\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Problem<\u002Fdiv>\n                <p>Existing SAP backend organized everything around order numbers. Users (Service Technicians) think in <i>physical machines<\u002Fi>, not orders.<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Decision<\u002Fdiv>\n                <p>Anchor the new IA on machine identity. Orders become a sub-view per machine. Argued through three reviews with PO and SAP architects.<\u002Fp>\n                <div class=\"img-box\">IA before / after<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Outcome<\u002Fdiv>\n                <p>Service Technicians completed lookup tasks in 41% less time during testing. Backend mapping handled via a thin frontend service.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"dcard\">\n            <div class=\"dcard-h\">\n              <span class=\"dcard-ix\">/02<\u002Fspan>\n              <span class=\"dcard-name\">Single dashboard, three roles<\u002Fspan>\n              <span class=\"dcard-tag\">Personas<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"dcard-body\">\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Problem<\u002Fdiv>\n                <p>Three distinct personas — Buyer, Admin, Technician — but the client wanted one platform, one URL, one onboarding.<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Decision<\u002Fdiv>\n                <p>Single dashboard, role-shaped widgets. The same component renders different data per role; layout adapts via grid order, not separate pages.<\u002Fp>\n                <div class=\"img-box\">3 dashboard states<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Outcome<\u002Fdiv>\n                <p>Reduced build cost (one frontend) and let users who switch roles (Admin who is also a Buyer) stay in one mental model.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"dcard\">\n            <div class=\"dcard-h\">\n              <span class=\"dcard-ix\">/03<\u002Fspan>\n              <span class=\"dcard-name\">No empty state for empty fleets<\u002Fspan>\n              <span class=\"dcard-tag\">Copy<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"dcard-body\">\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Problem<\u002Fdiv>\n                <p>New customers signed in to an empty dashboard. Test users assumed the system was broken.<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Decision<\u002Fdiv>\n                <p>Replaced \"empty state\" with a first-time setup checklist tied to onboarding workshops. Activation moves from <i>passive<\u002Fi> to <i>guided<\u002Fi>.<\u002Fp>\n                <div class=\"img-box\">Empty → checklist<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Outcome<\u002Fdiv>\n                <p>First-week activation up. Trained sales-engineers report fewer \"is this working?\" calls in week one.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"dcard\">\n            <div class=\"dcard-h\">\n              <span class=\"dcard-ix\">/04<\u002Fspan>\n              <span class=\"dcard-name\">Keep Balsamiq lo-fi all the way through testing<\u002Fspan>\n              <span class=\"dcard-tag\">Process<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"dcard-body\">\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Problem<\u002Fdiv>\n                <p>Pressure to skip wireframing and jump to Sketch hi-fi — \"the client wants to see something real\".<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Decision<\u002Fdiv>\n                <p>Held the line: usability tests on lo-fi wireframes, not on hi-fi. Users critique structure, not color. Three review rounds before pixel work.<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Outcome<\u002Fdiv>\n                <p>Saved an estimated 4 weeks of hi-fi rework. Stakeholders learned to trust the lo-fi → test → hi-fi sequence.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"dcard\">\n            <div class=\"dcard-h\">\n              <span class=\"dcard-ix\">/05<\u002Fspan>\n              <span class=\"dcard-name\">Embed UX in the Scrum team, don't toss-over<\u002Fspan>\n              <span class=\"dcard-tag\">Delivery<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"dcard-body\">\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Problem<\u002Fdiv>\n                <p>Internal + external devs. Risk of design intent being lost in translation between two organizations across time zones.<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Decision<\u002Fdiv>\n                <p>Attended every standup, every refinement, every review. Set up a Figma component spec doc that both teams could comment on directly.<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"dcell\">\n                <div class=\"dcell-h\">Outcome<\u002Fdiv>\n                <p>Zero design-vs-build disputes through acceptance. PO described handover as <i>\"the smoothest we've had\"<\u002Fi>.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"wf\" style=\"margin-top:18px\">\n          <div class=\"wf-h\"><span class=\"wf-name\">Closing · Next Project<\u002Fspan><span class=\"wf-tag opt\">Opt<\u002Fspan><\u002Fdiv>\n          <div class=\"wf-body\" style=\"padding:18px 22px\">\n            <div class=\"row\" style=\"justify-content:space-between;align-items:center\">\n              <div>\n                <div class=\"label-mono\">Next case study<\u002Fdiv>\n                <div style=\"font-size:18px;font-weight:600;margin-top:4px\">Fanuc · Service Portal Redesign →<\u002Fdiv>\n              <\u002Fdiv>\n              <span class=\"btn\">Read next<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"col-label\">Pattern Notes<\u002Fdiv>\n        <div class=\"ration\">\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Why decision log<\u002Fdiv>\n            <p>This is the pattern <b>most read as senior<\u002Fb>. It shows you can <i>argue<\u002Fi>, not just produce. Problem → Decision → Outcome mirrors how engineering ADRs work.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Anatomy<\u002Fdiv>\n            <ul style=\"font-size:11.5px;color:var(--ink-2);line-height:1.6;list-style:none\">\n              <li>· 4–6 cards per case · no more<\u002Fli>\n              <li>· Each card · 3 columns · same headers every time<\u002Fli>\n              <li>· One artifact image per card · in the middle column<\u002Fli>\n              <li>· Tag in top right · IA, Copy, Personas, Process, Delivery …<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">When to skip<\u002Fdiv>\n            <p>If the project's value was <b>volume of artifacts<\u002Fb> (lots of screens, big design system) — Sticky Scroll or Timeline carry that better.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\" style=\"background:#fafaf8\">\n            <div class=\"ration-h\">Use this for<\u002Fdiv>\n            <p>Mid-length, conceptually rich projects · Index-Traub · Mapal configurator · Titan Wagner CPQ<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ration-card\">\n            <div class=\"ration-h\">Recommendation<\u002Fdiv>\n            <p class=\"muted\">Mix patterns across your 4–5 cases. <b>Sticky Scroll<\u002Fb> for your flagship, <b>Timeline<\u002Fb> for the multi-quarter one, <b>Decision Log<\u002Fb> for the rest.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- ====================== JS: TABS + STICKY SCROLL DEMO ====================== -->\n<script>\n  // Tabs\n  const tabs = document.querySelectorAll('[role=\"tab\"]');\n  const panels = document.querySelectorAll('[data-tab-panel]');\n  function activateTab(name, push){\n    tabs.forEach(t => t.setAttribute('aria-selected', t.dataset.tab === name ? 'true' : 'false'));\n    panels.forEach(p => {\n      if(p.dataset.tabPanel === name){ p.setAttribute('data-active',''); }\n      else { p.removeAttribute('data-active'); }\n    });\n    if(push){\n      const u = new URL(location.href); u.hash = name; history.replaceState(null,'',u);\n    }\n    window.scrollTo({top:0, behavior:'instant'});\n  }\n  tabs.forEach(t => t.addEventListener('click', () => activateTab(t.dataset.tab, true)));\n  // initial from hash\n  const initial = location.hash.replace('#','');\n  if(initial && document.querySelector(`[data-tab-panel=\"${initial}\"]`)) activateTab(initial, false);\n\n  // Sticky scroll demo\n  const sections = document.querySelectorAll('.scroll-section');\n  const imgPanels = document.querySelectorAll('.img-panel');\n  const prog = document.getElementById('prog');\n  function activateSection(el){\n    if(!el) return;\n    sections.forEach(s => s.classList.remove('active'));\n    el.classList.add('active');\n    const n = el.dataset.panel;\n    imgPanels.forEach(p => p.classList.remove('visible'));\n    const target = document.getElementById('p' + n);\n    if(target) target.classList.add('visible');\n    if(prog) prog.style.width = el.dataset.prog + '%';\n  }\n  sections.forEach(s => s.addEventListener('click', () => activateSection(s)));\n  const scrollCol = document.getElementById('scrollCol');\n  if(scrollCol){\n    scrollCol.addEventListener('scroll', () => {\n      let closest=null, minDist=Infinity;\n      const colRect = scrollCol.getBoundingClientRect();\n      sections.forEach(s => {\n        const r = s.getBoundingClientRect();\n        const d = Math.abs(r.top - colRect.top - 40);\n        if(d < minDist){ minDist=d; closest=s; }\n      });\n      activateSection(closest);\n    });\n  }\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
