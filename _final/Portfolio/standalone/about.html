  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

k-2:#4A4A4A;\n  --ink-3:#8A8A8A;\n  --ink-4:#C2C2C2;\n  --rule:#ECEAE3;\n  --rule-2:#F4F2EC;\n  --tag-bg:#F1EFE8;\n\n  /* Accent — electric blue */\n  --accent:#1F50FF;\n  --accent-hov:#163FCC;\n  --accent-soft:#E8EEFF;\n  --accent-tint:#F4F6FF;\n\n  /* State */\n  --ok:#2E8B5F;\n  --warn:#C08A3B;\n\n  /* Type */\n  --sans:\"DM Sans\",\"Helvetica Neue\",Helvetica,Arial,sans-serif;\n  --mono:\"JetBrains Mono\",ui-monospace,\"SF Mono\",Menlo,Consolas,monospace;\n\n  /* Spacing */\n  --s-xs:4px; --s-sm:8px; --s-md:12px; --s-lg:16px; --s-xl:24px;\n  --s-2xl:32px; --s-3xl:48px; --s-4xl:72px; --s-5xl:120px;\n\n  /* Geometry */\n  --radius-sm:4px;\n  --radius:8px;\n  --radius-lg:16px;\n  --container:1240px;\n\n  /* Motion */\n  --ease:cubic-bezier(.22,.61,.36,1);\n  --t-fast:150ms;\n  --t-base:250ms;\n  --t-slow:400ms;\n\n  /* Shadow */\n  --shadow-sm:0 1px 2px rgba(10,10,10,.04), 0 1px 0 rgba(10,10,10,.02);\n  --shadow:0 4px 16px -4px rgba(10,10,10,.06), 0 1px 2px rgba(10,10,10,.04);\n  --shadow-lg:0 20px 50px -16px rgba(10,10,10,.14), 0 4px 12px -2px rgba(10,10,10,.06);\n}\n\n*{box-sizing:border-box;margin:0;padding:0}\nhtml{scroll-behavior:smooth}\nhtml,body{\n  background:var(--bg);\n  color:var(--ink);\n  font-family:var(--sans);\n  font-size:15px;\n  line-height:1.55;\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  font-variant-numeric:tabular-nums;\n}\nbody{min-height:100vh}\na{color:inherit;text-decoration:none}\nimg,svg{display:block;max-width:100%}\nbutton{font-family:inherit;cursor:pointer;border:none;background:none}\n\n/* ===== Layout ===== */\n.container{max-width:var(--container);margin:0 auto;padding:0 var(--s-xl)}\n.container-wide{max-width:1440px;margin:0 auto;padding:0 var(--s-xl)}\n@media (max-width:720px){\n  .container,.container-wide{padding:0 var(--s-lg)}\n}\n\n/* ===== Utility ===== */\n.eyebrow{\n  font-family:var(--mono);font-size:12px;letter-spacing:.1em;\n  text-transform:uppercase;color:var(--accent);font-weight:500;\n  display:inline-flex;align-items:center;gap:8px;\n}\n.eyebrow::before{\n  content:\"\";width:6px;height:6px;border-radius:50%;background:var(--accent);\n}\n.eyebrow.muted{color:var(--ink-3)}\n.eyebrow.muted::before{background:var(--ink-3)}\n\n.label-mono{\n  font-family:var(--mono);font-size:11px;letter-spacing:.1em;\n  text-transform:uppercase;color:var(--ink-3);font-weight:500;\n}\n\n.section{padding:var(--s-5xl) 0}\n.section-sm{padding:var(--s-4xl) 0}\n.section-tight{padding:var(--s-3xl) 0}\n@media (max-width:780px){\n  .section{padding:var(--s-3xl) 0}\n  .section-sm{padding:var(--s-2xl) 0}\n  .section-tight{padding:var(--s-xl) 0}\n}\n\n.h1{font-size:clamp(40px,6vw,72px);line-height:1.02;letter-spacing:-.025em;font-weight:500;text-wrap:balance}\n.h2{font-size:clamp(30px,4vw,52px);line-height:1.05;letter-spacing:-.022em;font-weight:500;text-wrap:balance}\n.h3{font-size:clamp(22px,2.4vw,32px);line-height:1.15;letter-spacing:-.015em;font-weight:500}\n.h4{font-size:clamp(18px,1.8vw,22px);line-height:1.25;letter-spacing:-.01em;font-weight:600}\n.lede{font-size:clamp(16px,1.4vw,19px);line-height:1.55;color:var(--ink-2);max-width:54ch}\n.body-lg{font-size:17px;line-height:1.65;color:var(--ink-2)}\n\n.kicker{color:var(--accent)}\n.muted{color:var(--ink-3)}\n\n/* ===== NAV ===== */\n.nav{\n  position:sticky;top:0;z-index:60;\n  background:rgba(255,255,255,.82);\n  backdrop-filter:saturate(140%) blur(10px);\n  -webkit-backdrop-filter:saturate(140%) blur(10px);\n  border-bottom:1px solid transparent;\n  transition:border-color .25s var(--ease),background .25s var(--ease);\n}\n.nav.scrolled{\n  border-bottom-color:var(--rule);\n  background:rgba(255,255,255,.95);\n}\n.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:var(--s-xl);padding:16px 0;max-width:var(--container);margin:0 auto;padding-left:var(--s-xl);padding-right:var(--s-xl)}\n@media (max-width:720px){.nav-inner{padding-left:var(--s-lg);padding-right:var(--s-lg)}}\n\n.brand{display:flex;align-items:center;gap:12px;font-family:var(--sans);font-weight:600;font-size:16px;letter-spacing:-.012em;color:var(--ink)}\n.brand-logo{height:22px;width:auto;display:block}\n.brand-mark{\n  width:28px;height:28px;border-radius:7px;\n  background:var(--ink);\n  position:relative;flex-shrink:0;\n  display:flex;align-items:center;justify-content:center;\n  color:#fff;font-family:var(--mono);font-size:13px;font-weight:600;\n}\n.brand-mark::after{\n  content:\"\";position:absolute;top:5px;right:5px;\n  width:6px;height:6px;border-radius:50%;background:var(--accent);\n}\n\n.nav-center{display:flex;gap:var(--s-2xl);align-items:center}\n\n/* ===== BURGER + MOBILE NAV ===== */\n.nav-burger{\n  display:none;flex-direction:column;justify-content:center;gap:5px;\n  width:40px;height:40px;background:transparent;border:none;cursor:pointer;\n  padding:8px;border-radius:8px;flex-shrink:0;\n  transition:background var(--t-fast);\n  position:relative;z-index:80;\n}\n.nav-burger:hover{background:var(--tag-bg)}\n.nav-burger span{\n  display:block;width:100%;height:1.5px;background:var(--ink);border-radius:2px;\n  transform-origin:center;\n  transition:transform .28s var(--ease), opacity .2s, width .25s var(--ease);\n}\n.nav-burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}\n.nav-burger.open span:nth-child(2){opacity:0;width:0}\n.nav-burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}\n@media (max-width:780px){.nav-burger{display:flex}.nav-center{display:none}.nav-right .btn{display:none}.nav-right .nav-state{display:none}}\n\n.nav-mobile{\n  position:fixed;inset:0;z-index:70;\n  background:rgba(255,255,255,.98);\n  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);\n  display:flex;flex-direction:column;justify-content:center;align-items:center;\n  gap:0;\n  opacity:0;pointer-events:none;\n  transform:translateY(-8px);\n  transition:opacity .3s var(--ease), transform .3s var(--ease);\n}\n.nav-mobile.open{opacity:1;pointer-events:auto;transform:translateY(0)}\n.nm-links{\n  display:flex;flex-direction:column;align-items:center;gap:0;\n  width:100%;max-width:360px;\n  border-top:1px solid var(--rule);\n}\n.nm-link{\n  display:block;width:100%;text-align:center;\n  padding:20px var(--s-xl);\n  font-size:28px;font-weight:500;letter-spacing:-.02em;color:var(--ink);\n  border-bottom:1px solid var(--rule);\n  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease);\n}\n.nm-link:hover{color:var(--accent);background:var(--accent-tint)}\n.nm-link.active{color:var(--accent)}\n.nm-footer{\n  margin-top:var(--s-2xl);\n  text-align:center;\n  display:flex;flex-direction:column;align-items:center;gap:var(--s-md);\n}\n@media (min-width:781px){.nav-mobile{display:none!important}}\n.nav-link{\n  font-family:var(--sans);font-size:14px;font-weight:500;color:var(--ink-2);\n  padding:8px 4px;letter-spacing:-.005em;\n  transition:color var(--t-fast) var(--ease);\n  position:relative;\n}\n.nav-link:hover{color:var(--ink)}\n.nav-link.active{color:var(--ink)}\n.nav-link.active::after{\n  content:\"\";position:absolute;left:4px;right:4px;bottom:0;\n  height:2px;background:var(--accent);border-radius:1px;\n}\n\n.nav-right{display:flex;align-items:center;gap:var(--s-md)}\n.nav-state{\n  display:none;align-items:center;gap:8px;\n  font-family:var(--mono);font-size:11px;letter-spacing:.08em;\n  text-transform:uppercase;color:var(--ink-3);font-weight:500;\n}\n@media (min-width:900px){.nav-state{display:inline-flex}}\n.nav-state .dot{\n  width:7px;height:7px;border-radius:50%;background:var(--ok);\n  box-shadow:0 0 0 0 rgba(46,139,95,.4);animation:pulse 2.4s var(--ease) infinite;\n}\n@keyframes pulse{\n  0%{box-shadow:0 0 0 0 rgba(46,139,95,.4)}\n  70%{box-shadow:0 0 0 6px rgba(46,139,95,0)}\n  100%{box-shadow:0 0 0 0 rgba(46,139,95,0)}\n}\n\n@media (max-width:780px){\n  .nav-center{display:none}\n}\n\n/* ===== BUTTONS ===== */\n.btn{\n  display:inline-flex;align-items:center;gap:8px;\n  font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:-.005em;\n  padding:11px 18px;border-radius:999px;\n  background:var(--ink);color:#fff;\n  transition:background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease), color var(--t-fast) var(--ease);\n  cursor:pointer;line-height:1;\n}\n.btn:hover{background:#222}\n.btn .arr{transition:transform var(--t-fast) var(--ease);font-size:15px}\n.btn:hover .arr{transform:translateX(4px)}\n\n.btn-accent{background:var(--accent);color:#fff}\n.btn-accent:hover{background:var(--accent-hov)}\n\n.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--rule)}\n.btn-ghost:hover{background:#fff;border-color:var(--ink-3)}\n\n.btn-sm{padding:8px 14px;font-size:13px}\n.btn-lg{padding:14px 22px;font-size:15px}\n\n.link-arrow{\n  display:inline-flex;align-items:center;gap:6px;\n  font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:-.005em;\n  color:var(--accent);\n  transition:color var(--t-fast) var(--ease);\n}\n.link-arrow .arr{transition:transform var(--t-fast) var(--ease)}\n.link-arrow:hover{color:var(--accent-hov)}\n.link-arrow:hover .arr{transform:translateX(4px)}\n\n/* ===== TAGS / CHIPS ===== */\n.tag{\n  display:inline-flex;align-items:center;\n  font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.04em;\n  text-transform:uppercase;color:var(--ink-2);\n  background:var(--tag-bg);padding:5px 9px;border-radius:999px;\n}\n.tag-accent{background:var(--accent-soft);color:var(--accent)}\n.tag-outline{background:transparent;border:1px solid var(--rule);color:var(--ink-2)}\n\n/* ===== CARD ===== */\n.card{\n  background:var(--card);border:1px solid var(--rule);border-radius:var(--radius-lg);\n  padding:var(--s-2xl);\n  transition:transform var(--t-base) var(--ease), box-shadow var(--t-base) var(--ease), border-color var(--t-base) var(--ease);\n}\n.card-hov:hover{\n  transform:translateY(-2px);\n  box-shadow:var(--shadow-lg);\n  border-color:#dcdad3;\n}\n\n/* ===== HERO blocks ===== */\n.hero{padding:var(--s-5xl) 0 var(--s-4xl);position:relative}\n.hero-meta{\n  display:flex;gap:var(--s-xl);flex-wrap:wrap;margin-bottom:var(--s-2xl);\n}\n.hero-meta-item{\n  font-family:var(--mono);font-size:11px;letter-spacing:.08em;\n  text-transform:uppercase;color:var(--ink-3);font-weight:500;\n}\n.hero-meta-item b{color:var(--ink);font-weight:500}\n\n/* ===== FOOTER ===== */\n.foot{\n  border-top:1px solid var(--rule);\n  margin-top:var(--s-5xl);\n  padding:var(--s-3xl) 0 var(--s-xl);\n  background:var(--bg);\n}\n.foot-grid{\n  display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:var(--s-2xl);\n  margin-bottom:var(--s-3xl);\n}\n@media (max-width:900px){\n  .foot-grid{grid-template-columns:1fr 1fr;gap:var(--s-xl)}\n}\n@media (max-width:520px){\n  .foot-grid{grid-template-columns:1fr}\n}\n.foot-col h5{\n  font-family:var(--mono);font-size:11px;letter-spacing:.1em;\n  text-transform:uppercase;color:var(--ink-3);font-weight:500;\n  margin-bottom:var(--s-md);\n}\n.foot-col ul{list-style:none;display:flex;flex-direction:column;gap:8px}\n.foot-col a{\n  font-size:14px;color:var(--ink-2);transition:color var(--t-fast) var(--ease);\n}\n.foot-col a:hover{color:var(--ink)}\n.foot-statement{\n  font-size:17px;line-height:1.45;letter-spacing:-.01em;color:var(--ink);\n  max-width:32ch;font-weight:500;margin-bottom:var(--s-lg);\n}\n.foot-bot{\n  display:flex;justify-content:space-between;align-items:center;gap:var(--s-lg);\n  flex-wrap:wrap;padding-top:var(--s-xl);border-top:1px solid var(--rule);\n}\n.foot-bot,.foot-bot a{\n  font-family:var(--mono);font-size:11px;letter-spacing:.08em;\n  text-transform:uppercase;color:var(--ink-3);\n}\n.foot-bot a:hover{color:var(--ink)}\n.foot-bot .left{display:flex;gap:var(--s-lg);flex-wrap:wrap;align-items:center}\n\n/* ===== Reveal ===== */\n.reveal{opacity:0;transform:translateY(10px);transition:opacity .6s var(--ease), transform .6s var(--ease)}\n.reveal.in{opacity:1;transform:none}\n@media (prefers-reduced-motion:reduce){\n  .reveal{opacity:1;transform:none;transition:none}\n  .nav-state .dot{animation:none}\n}\n\n/* ===== Text Line Reveal ===== */\n.text-reveal .line{display:block;overflow:hidden;padding-bottom:.12em;margin-bottom:-.12em}\n.text-reveal .line-inner{display:block;transform:translateY(115%);transition:transform .85s cubic-bezier(.16,1,.3,1);will-change:transform}\n.text-reveal.in .line-inner{transform:translateY(0)}\n.text-reveal .line:nth-child(1) .line-inner{transition-delay:.1s}\n.text-reveal .line:nth-child(2) .line-inner{transition-delay:.18s}\n.text-reveal .line:nth-child(3) .line-inner{transition-delay:.26s}\n.text-reveal .line:nth-child(4) .line-inner{transition-delay:.34s}\n.text-reveal .line:nth-child(5) .line-inner{transition-delay:.42s}\n@media(prefers-reduced-motion:reduce){.text-reveal .line-inner{transform:none;transition:none}}\n\n/* ===== Common section heads ===== */\n.section-head{\n  display:grid;grid-template-columns:1fr auto;gap:var(--s-xl);\n  align-items:end;margin-bottom:var(--s-3xl);\n}\n@media (max-width:720px){\n  .section-head{grid-template-columns:1fr}\n}\n.section-head .ev{margin-bottom:var(--s-md)}\n.section-head .aside{\n  font-family:var(--mono);font-size:12px;letter-spacing:.06em;\n  text-transform:uppercase;color:var(--ink-3);text-align:right;line-height:1.7;\n}\n.section-head .aside b{color:var(--ink);font-weight:500}\n@media (max-width:720px){\n  .section-head .aside{text-align:left}\n}\n\n/* ===== Worklist (numbered, used on Home + Work) ===== */\n.worklist{border-top:1px solid var(--ink);margin-top:var(--s-lg)}\n.work-row{\n  display:grid;\n  grid-template-columns:56px 1.7fr 1fr auto auto;\n  gap:var(--s-xl);\n  align-items:center;\n  padding:var(--s-xl) 0;\n  border-bottom:1px solid var(--rule);\n  position:relative;\n  transition:padding var(--t-base) var(--ease);\n  cursor:pointer;\n}\n.work-row:hover{padding-left:var(--s-md)}\n.wi-ix{font-family:var(--mono);font-size:13px;color:var(--ink-3);font-weight:500;letter-spacing:.04em}\n.wi-title{font-size:clamp(20px,2.2vw,28px);font-weight:500;letter-spacing:-.012em;line-height:1.15;color:var(--ink);text-wrap:balance}\n.wi-client{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-top:4px;font-weight:500}\n.wi-tags{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}\n.wi-year{font-family:var(--mono);font-size:13px;color:var(--ink-3);letter-spacing:.04em}\n.wi-arr{font-family:var(--mono);font-size:18px;color:var(--ink-3);transition:transform var(--t-fast) var(--ease), color var(--t-fast) var(--ease)}\n.work-row:hover .wi-arr{transform:translateX(6px);color:var(--accent)}\n.work-row:hover .wi-title{color:var(--ink)}\n@media (max-width:780px){\n  .work-row{grid-template-columns:36px 1fr auto;gap:var(--s-md)}\n  .wi-tags,.wi-year{display:none}\n}\n\n/* ===== Page header (for sub-pages) ===== */\n.pagehead{\n  padding:var(--s-5xl) 0 var(--s-3xl);\n  border-bottom:1px solid var(--rule);\n}\n.pagehead .ev{margin-bottom:var(--s-md)}\n.pagehead h1{margin-bottom:var(--s-md)}\n.pagehead p{font-size:clamp(16px,1.4vw,19px);line-height:1.55;color:var(--ink-2);max-width:60ch}\n\n/* ===== Subtle pattern (disabled — white bg) ===== */\n.hero-bg{\n  position:absolute;inset:0;pointer-events:none;z-index:-1;\n  background:transparent;\n}\n\n/* ===== Mobile: inline panel images in sticky-scroll steps ===== */\n.step .mob-panel-img{display:none}\n@media(max-width:900px){\n  .sticky-left{display:none !important}\n  .step .mob-panel-img{\n    display:block;width:100%;border-radius:var(--radius-lg);overflow:hidden;\n    background:var(--card);border:1px solid var(--rule);margin-bottom:var(--s-lg);line-height:0;\n  }\n  .step .mob-panel-img img,\n  .step .mob-panel-img video{width:100%;display:block;object-fit:cover;object-position:center top;max-height:280px}\n}\n<\u002Fstyle>\n<style>\n  /* About-specific */\n  .about-hero{\n    padding:var(--s-5xl) 0 var(--s-4xl);\n    position:relative;overflow:hidden;\n  }\n  .about-hero .container{\n    display:grid;grid-template-columns:1.4fr 1fr;gap:var(--s-4xl);align-items:end;\n  }\n  @media (max-width:900px){\n    .about-hero{padding:var(--s-3xl) 0 var(--s-2xl)}\n    .about-hero .container{grid-template-columns:1fr;gap:var(--s-2xl)}\n  }\n  .about-hero h1{margin-bottom:var(--s-lg)}\n  .about-hero .lede{margin-bottom:var(--s-xl)}\n\n  .portrait{\n    aspect-ratio:4/5;background:var(--bg-2);border-radius:var(--radius-lg);overflow:hidden;\n    position:relative;border:1px solid var(--rule);\n    display:flex;align-items:center;justify-content:center;\n  }\n  .portrait .ph-label{\n    font-family:var(--mono);font-size:11px;letter-spacing:.1em;\n    text-transform:uppercase;color:var(--ink-3);text-align:center;line-height:1.6;padding:var(--s-md);\n  }\n  .portrait::before{\n    content:\"\";position:absolute;inset:0;\n    background:repeating-linear-gradient(45deg, transparent 0 14px, rgba(0,0,0,.025) 14px 15px);\n  }\n\n  /* Stats */\n  .stats{\n    display:grid;grid-template-columns:repeat(4,1fr);gap:0;\n    border-top:1px solid var(--ink);border-bottom:1px solid var(--rule);\n    margin:var(--s-3xl) 0;\n  }\n  @media (max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}\n  .stat{padding:var(--s-xl) var(--s-lg) var(--s-xl) 0;border-right:1px solid var(--rule)}\n  .stat:not(:first-child){padding-left:var(--s-lg)}\n  .stat:last-child{border-right:none}\n  @media (max-width:720px){\n    .stat:nth-child(2){border-right:none;padding-right:0}\n    .stat:nth-child(3){padding-left:0;border-top:1px solid var(--rule)}\n    .stat:nth-child(4){border-right:none;border-top:1px solid var(--rule)}\n  }\n  .stat .v{font-size:clamp(28px,3.5vw,44px);font-weight:500;letter-spacing:-.02em;color:var(--ink);line-height:1;margin-bottom:var(--s-md)}\n  .stat .l{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);line-height:1.5}\n\n  /* Bio + lists split */\n  .bio-grid{\n    display:grid;grid-template-columns:1.2fr 1fr;gap:var(--s-4xl);align-items:start;\n  }\n  @media (max-width:900px){.bio-grid{grid-template-columns:1fr;gap:var(--s-2xl)}}\n  .bio p{font-size:17px;line-height:1.7;color:var(--ink-2)}\n  .bio p + p{margin-top:var(--s-lg)}\n  .bio p b, .bio p strong{color:var(--ink);font-weight:500}\n\n  /* Quick facts */\n  .facts{display:flex;flex-direction:column;gap:0;background:var(--card);border:1px solid var(--rule);border-radius:var(--radius-lg);overflow:hidden}\n  .fact{\n    display:grid;grid-template-columns:120px 1fr;gap:var(--s-lg);\n    padding:var(--s-lg);border-bottom:1px solid var(--rule);align-items:start;\n  }\n  .fact:last-child{border-bottom:none}\n  .fact dt{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:500;padding-top:2px}\n  .fact dd{font-size:14px;color:var(--ink);line-height:1.5}\n  .fact dd a{color:var(--accent);transition:color var(--t-fast)}\n  .fact dd a:hover{color:var(--accent-hov)}\n\n  /* Process — Stacked sticky cards */\n  /* Process — static phase list */\n  .process{padding:var(--s-5xl) 0;background:var(--bg-2);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}\n  @media(max-width:780px){.process{padding:var(--s-3xl) 0}}\n  .process-head{\n    display:grid;grid-template-columns:1fr 1fr;gap:var(--s-4xl);align-items:end;margin-bottom:var(--s-3xl);\n  }\n  @media (max-width:780px){.process-head{grid-template-columns:1fr;gap:var(--s-lg)}}\n  .process-head h2{max-width:14ch}\n  .process-head p{font-size:16px;line-height:1.6;color:var(--ink-2);max-width:48ch}\n\n  /* Phase list block */\n  .phase-list{\n    background:var(--card);border:1px solid var(--rule);border-radius:var(--radius-lg);\n    overflow:hidden;\n  }\n  .phase-row{\n    display:grid;\n    grid-template-columns:72px 64px 1fr auto;\n    gap:var(--s-xl);\n    align-items:center;\n    padding:var(--s-xl) var(--s-2xl);\n    border-bottom:1px solid var(--rule);\n    cursor:default;\n    transition:background .25s var(--ease);\n    position:relative;\n  }\n  .phase-row:last-child{border-bottom:none}\n  .phase-row:hover{background:linear-gradient(135deg,rgba(31,80,255,.04) 0%,rgba(123,92,240,.04) 100%)}\n  @media (max-width:780px){\n    .phase-row{grid-template-columns:48px 48px 1fr;gap:var(--s-md);padding:var(--s-lg)}\n    .pr-out{display:none}\n  }\n\n  /* Number */\n  .pr-num{\n    font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:-.02em;\n    color:var(--ink-4);line-height:1;\n    transition:color .25s var(--ease);\n  }\n  .phase-row:hover .pr-num{color:var(--accent)}\n\n  /* Icon box */\n  .pr-icon{\n    width:48px;height:48px;border-radius:10px;\n    background:var(--tag-bg);border:1px solid var(--rule);\n    display:flex;align-items:center;justify-content:center;\n    flex-shrink:0;\n    transition:background .3s var(--ease),border-color .3s var(--ease),box-shadow .3s var(--ease);\n  }\n  .pr-icon svg{\n    width:22px;height:22px;\n    transition:stroke .3s var(--ease), fill .3s var(--ease);\n  }\n  .phase-row:hover .pr-icon{\n    background:linear-gradient(135deg,#1F50FF 0%,#7B5CF0 100%);\n    border-color:transparent;\n    box-shadow:0 6px 18px -6px rgba(31,80,255,.45);\n  }\n  .phase-row:hover .pr-icon svg{stroke:#fff;fill:none}\n  .phase-row:hover .pr-icon svg .fill-icon{fill:#fff;stroke:none}\n\n  /* Body */\n  .pr-body{}\n  .pr-name{font-size:16px;font-weight:600;letter-spacing:-.008em;color:var(--ink);margin-bottom:4px;transition:color .2s}\n  .phase-row:hover .pr-name{color:var(--accent)}\n  .pr-desc{font-size:13.5px;line-height:1.55;color:var(--ink-2);max-width:54ch}\n\n  /* Output pill */\n  .pr-out{\n    font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;\n    color:var(--ink-3);background:var(--tag-bg);border-radius:999px;\n    padding:5px 10px;white-space:nowrap;flex-shrink:0;\n    transition:background .25s var(--ease),color .25s var(--ease);\n  }\n  .phase-row:hover .pr-out{\n    background:var(--accent-soft);color:var(--accent);\n  }\n\n  /* Skills */\n  .skills-grid{\n    display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s-xl);\n  }\n  @media (max-width:780px){.skills-grid{grid-template-columns:1fr}}\n  .skill-block{\n    padding:var(--s-xl);border:1px solid var(--rule);border-radius:var(--radius-lg);background:var(--card);\n    transition:background .3s var(--ease), border-color .3s var(--ease), box-shadow .3s var(--ease);\n    cursor:default;\n  }\n  .skill-block:hover{\n    background:linear-gradient(135deg,rgba(31,80,255,.04) 0%,rgba(123,92,240,.04) 100%);\n    border-color:rgba(31,80,255,.2);\n    box-shadow:0 6px 24px -8px rgba(31,80,255,.12);\n  }\n  .skill-block h4{\n    font-size:16px;font-weight:600;margin-bottom:var(--s-md);\n    display:flex;align-items:center;gap:10px;\n    transition:color .25s var(--ease);\n  }\n  .skill-block:hover h4{color:var(--accent)}\n  .skill-block h4::before{\n    content:\"\";width:8px;height:8px;border-radius:50%;background:var(--accent);\n    flex-shrink:0;\n    transition:transform .3s var(--ease), box-shadow .3s var(--ease);\n  }\n  .skill-block:hover h4::before{\n    transform:scale(1.4);\n    box-shadow:0 0 0 4px rgba(31,80,255,.15);\n  }\n  .skill-list{display:flex;flex-wrap:wrap;gap:6px}\n  .skill-list .tag{\n    cursor:default;\n    transition:background .2s var(--ease), color .2s var(--ease);\n  }\n  .skill-block:hover .skill-list .tag{\n    background:var(--accent-soft);color:var(--accent);\n  }\n\n  /* Experience timeline */\n  .exp-list{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--ink)}\n  .exp-row{\n    display:grid;grid-template-columns:120px 1.4fr 1fr 140px;gap:var(--s-xl);align-items:start;\n    padding:var(--s-xl) 0;border-bottom:1px solid var(--rule);\n  }\n  @media (max-width:780px){\n    .exp-row{grid-template-columns:1fr;gap:var(--s-xs)}\n    .exp-row .year{order:-1;font-size:12px}\n  }\n  .exp-row .year{font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:var(--ink-3);font-weight:500}\n  .exp-row .role{font-size:18px;font-weight:600;letter-spacing:-.005em}\n  .exp-row .role .co{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-top:4px}\n  .exp-row .desc{font-size:14px;color:var(--ink-2);line-height:1.55;text-align:left;align-self:start}\n  .exp-row .loc{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);text-align:right}\n  @media (max-width:780px){.exp-row .loc{text-align:left;margin-top:var(--s-xs)}}\n\n<\u002Fstyle>\n\n\n\n<\u002Fhead>\n<body>\n\n<nav class=\"nav\" id=\"nav\">\n  <div class=\"nav-inner\">\n    <a class=\"brand\" href=\"index.html\"><img class=\"brand-logo\" src=\"94cad96d-0a10-4119-be9e-c9128af3a6ca\" alt=\"reichard\"><\u002Fa>\n    <div class=\"nav-center\">\n      <a class=\"nav-link\" href=\"index.html\">Home<\u002Fa>\n      <a class=\"nav-link\" href=\"work.html\">Work<\u002Fa>\n      <a class=\"nav-link active\" href=\"about.html\">About<\u002Fa>\n      <a class=\"nav-link\" href=\"contact.html\">Contact<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"nav-right\">\n      <span class=\"nav-state\"><span class=\"dot\"><\u002Fspan>Available · 2026<\u002Fspan>\n      <a class=\"btn btn-sm btn-accent\" href=\"contact.html\">Get in touch <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <button class=\"nav-burger\" id=\"navBurger\" aria-label=\"Toggle menu\" aria-expanded=\"false\">\n      <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<main>\n\n  <!-- HERO -->\n  <section class=\"about-hero\" data-screen-label=\"01 About Hero\">\n    <div class=\"container\">\n    <div>\n      <span class=\"eyebrow ev reveal\" style=\"margin-bottom:var(--s-md);display:inline-flex;transition-delay:.05s\">/01 · About<\u002Fspan>\n      <h1 class=\"h1 text-reveal\">\n        <span class=\"line\"><span class=\"line-inner\">Designer, consultant,<\u002Fspan><\u002Fspan>\n        <span class=\"line\"><span class=\"line-inner\">workshop lead.<\u002Fspan><\u002Fspan>\n      <\u002Fh1>\n      <p class=\"lede reveal\" style=\"transition-delay:.3s\">\n        I'm a Senior UI/UX Designer &amp; Consultant with six years across B2B and industrial digital products. Portals, eShops, fleet &amp; machine-management platforms for clients like Schunk, Fanuc, Enercon and Mapal.\n      <\u002Fp>\n      <p class=\"lede\">\n        I started in a Vienna agency, learned the craft against tight client deadlines, and have spent the last years leading UX from <b>Phase 0<\u002Fb> through Scrum delivery in interdisciplinary teams.\n      <\u002Fp>\n      <div style=\"display:flex;gap:var(--s-md);flex-wrap:wrap;margin-top:var(--s-xl)\">\n        <a class=\"btn btn-accent\" href=\"contact.html\">Get in touch <span class=\"arr\">→<\u002Fspan><\u002Fa>\n        <a class=\"btn btn-ghost\" href=\"work.html\">View work<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"portrait\">\n      <div class=\"ph-label\">Portrait<br>Replace with photo<br>4:5 · ≈ 1080 × 1350<\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section class=\"container\">\n    <div class=\"stats\">\n      <div class=\"stat\"><div class=\"v\">06<\u002Fdiv><div class=\"l\">Years of practice<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"v\">12+<\u002Fdiv><div class=\"l\">B2B platforms shipped<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"v\">BA<\u002Fdiv><div class=\"l\">Interaction Design<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"v\">EN · DE<\u002Fdiv><div class=\"l\">Working languages<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BIO + FACTS -->\n  <section class=\"section-sm\">\n    <div class=\"container\">\n      <div class=\"bio-grid\">\n        <div class=\"bio\">\n          <span class=\"eyebrow ev\" style=\"margin-bottom:var(--s-md);display:inline-flex\">/02 · Bio<\u002Fspan>\n          <h2 class=\"h3\" style=\"margin-bottom:var(--s-lg);max-width:18ch\">From agency floor to senior consultant.<\u002Fh2>\n          <p>\n            My focus sits in <b>eCommerce<\u002Fb>, SAP Commerce, customer portals, fleet and machine management platforms. I work best in interdisciplinary teams alongside internal and external developers, where strong communication is the difference between a good design and one that actually ships.\n          <\u002Fp>\n          <p>\n            I own the whole UX path: <b>client communication, research, workshops, wireframes, testing, alignment, and delivery<\u002Fb>. I speak the language of PO/PL stakeholders just as well as the dev team on the other side of the handover.\n          <\u002Fp>\n          <p>\n            AI is changing how we design, and I lean into that. I use it across the entire workflow, from research synthesis to prototyping to delivery. Not as a shortcut, but as a <b>tool that makes every phase faster and sharper<\u002Fb>. Better iterations, better insights, better outcomes for the team and the end user.\n          <\u002Fp>\n        <\u002Fdiv>\n        <aside style=\"height: 430px\">\n          <span class=\"eyebrow muted ev\" style=\"margin-bottom:var(--s-md);display:inline-flex\">Quick facts<\u002Fspan>\n          <dl class=\"facts\">\n            <div class=\"fact\"><dt>Currently<\u002Fdt><dd>UI/UX Consultant<\u002Fdd><\u002Fdiv>\n            <div class=\"fact\"><dt>Previously<\u002Fdt><dd>Agency, Vienna · 5 years<\u002Fdd><\u002Fdiv>\n            <div class=\"fact\"><dt>Education<\u002Fdt><dd>BA Interaction Design<\u002Fdd><\u002Fdiv>\n            <div class=\"fact\"><dt>Based in<\u002Fdt><dd>Villingen-Schwenningen<\u002Fdd><\u002Fdiv>\n            <div class=\"fact\"><dt>Languages<\u002Fdt><dd>English · German (native)<\u002Fdd><\u002Fdiv>\n            <div class=\"fact\"><dt>Focus<\u002Fdt><dd>B2B-Plattformen · Commerce · Experten-Tools · Fleet-Management · Corporate-Portale<\u002Fdd><\u002Fdiv>\n            <div class=\"fact\"><dt>Available<\u002Fdt><dd><span style=\"color:var(--ok);display:inline-flex;align-items:center;gap:6px\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block\"><\u002Fspan>Senior roles · 2026<\u002Fspan><\u002Fdd><\u002Fdiv>\n          <\u002Fdl>\n        <\u002Faside>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROCESS — static list -->\n  <section class=\"process\" data-screen-label=\"03 Process\">\n    <div class=\"container\">\n      <div class=\"process-head\">\n        <div>\n          <span class=\"eyebrow ev\">/03 · Process<\u002Fspan>\n          <h2 class=\"h2\" style=\"margin-top:var(--s-md)\">Phase&nbsp;0 → Delivery.<\u002Fh2>\n        <\u002Fdiv>\n        <p>Six steps. Every project, the same spine. Adapted to context, never skipped.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"phase-list\">\n\n        <div class=\"phase-row\">\n          <span class=\"pr-num\">00<\u002Fspan>\n          <div class=\"pr-icon\">\n            <svg viewBox=\"0 0 22 22\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <circle cx=\"11\" cy=\"11\" r=\"9\"><\u002Fcircle>\n              <path d=\"M7 11h8M11 7l4 4-4 4\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"pr-body\">\n            <div class=\"pr-name\">Phase 0: Alignment<\u002Fdiv>\n            <div class=\"pr-desc\">Kickoff workshops with PO &amp; PL. Stakeholder map, success metrics, working agreement. Before any design work begins.<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"pr-out\">Stakeholder map · Metrics<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"phase-row\">\n          <span class=\"pr-num\">01<\u002Fspan>\n          <div class=\"pr-icon\">\n            <svg viewBox=\"0 0 22 22\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <circle cx=\"9.5\" cy=\"9.5\" r=\"6\"><\u002Fcircle>\n              <path d=\"M20 20l-4.35-4.35\"><\u002Fpath>\n              <path d=\"M7 9.5h5M9.5 7v5\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"pr-body\">\n            <div class=\"pr-name\">Research &amp; Audit<\u002Fdiv>\n            <div class=\"pr-desc\">Heuristic evaluation, user interviews across primary personas, pain-point maps and journey maps to surface where the real breaks are.<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"pr-out\">Personas · Journey maps<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"phase-row\">\n          <span class=\"pr-num\">02<\u002Fspan>\n          <div class=\"pr-icon\">\n            <svg viewBox=\"0 0 22 22\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect>\n              <rect x=\"12\" y=\"3\" width=\"7\" height=\"4\" rx=\"1.5\"><\u002Frect>\n              <rect x=\"12\" y=\"10\" width=\"7\" height=\"9\" rx=\"1.5\"><\u002Frect>\n              <rect x=\"3\" y=\"13\" width=\"7\" height=\"6\" rx=\"1.5\"><\u002Frect>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"pr-body\">\n            <div class=\"pr-name\">Wireframes &amp; IA<\u002Fdiv>\n            <div class=\"pr-desc\">Lo-fi wireframes in Balsamiq, three review rounds. Sitemaps that collapse legacy complexity before a pixel is drawn.<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"pr-out\">Sitemap · WF v1–v3<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"phase-row\">\n          <span class=\"pr-num\">03<\u002Fspan>\n          <div class=\"pr-icon\">\n            <svg viewBox=\"0 0 22 22\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M5 12l4 4 8-9\"><\u002Fpath>\n              <circle cx=\"11\" cy=\"11\" r=\"9\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"pr-body\">\n            <div class=\"pr-name\">Testing<\u002Fdiv>\n            <div class=\"pr-desc\">Moderated usability tests with 6–10 real users on the v3 wireframes. No design ships without test evidence and measurable deltas.<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"pr-out\">Protocols · Findings<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"phase-row\">\n          <span class=\"pr-num\">04<\u002Fspan>\n          <div class=\"pr-icon\">\n            <svg viewBox=\"0 0 22 22\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <rect x=\"2\" y=\"13\" width=\"18\" height=\"7\" rx=\"2\"><\u002Frect>\n              <rect x=\"5\" y=\"7\" width=\"12\" height=\"6\" rx=\"1.5\"><\u002Frect>\n              <rect x=\"8\" y=\"2\" width=\"6\" height=\"5\" rx=\"1\"><\u002Frect>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"pr-body\">\n            <div class=\"pr-name\">Hi-Fi &amp; Component Library<\u002Fdiv>\n            <div class=\"pr-desc\">Final design in Sketch or Figma. Component library aligned with platform conventions, co-authored with dev leads.<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"pr-out\">Hi-Fi · Spec doc<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"phase-row\">\n          <span class=\"pr-num\">05<\u002Fspan>\n          <div class=\"pr-icon\">\n            <svg viewBox=\"0 0 22 22\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M12 2C8 2 5 6 5 10c0 2.5 1.2 4.7 3 6.1V19h6v-2.9c1.8-1.4 3-3.6 3-6.1 0-4-3-8-5-8z\"><\u002Fpath>\n              <path d=\"M9 19h4M10 22h2\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"pr-body\">\n            <div class=\"pr-name\">Scrum Delivery<\u002Fdiv>\n            <div class=\"pr-desc\">Embedded UX in 2-week sprints. Every standup, refinement, review. Continuous QA through acceptance. Zero design-vs-build disputes.<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"pr-out\">Live since launch<\u002Fspan>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SKILLS -->\n  <section class=\"section-sm\">\n    <div class=\"container\">\n      <div class=\"section-head\">\n        <div>\n          <span class=\"eyebrow ev\">/04 · Skills<\u002Fspan>\n          <h2 class=\"h3\">Tools, methods, mindset.<\u002Fh2>\n        <\u002Fdiv>\n        <div class=\"aside\">\n          <b>T-shaped<\u002Fb><br>\n          Deep · B2B platform UX<br>\n          Wide · workshops, research, delivery\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"skills-grid\">\n        <div class=\"skill-block\">\n          <h4>Design Tools<\u002Fh4>\n          <div class=\"skill-list\">\n            <span class=\"tag\">Figma<\u002Fspan>\n            <span class=\"tag\">Sketch<\u002Fspan>\n            <span class=\"tag\">Balsamiq<\u002Fspan>\n            <span class=\"tag\">FigJam<\u002Fspan>\n            <span class=\"tag\">Miro<\u002Fspan>\n            <span class=\"tag\">Framer<\u002Fspan>\n            <span class=\"tag\">Adobe Cloud<\u002Fspan>\n            <span class=\"tag\">Microsoft Office<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"skill-block\">\n          <h4>Research &amp; Strategy<\u002Fh4>\n          <div class=\"skill-list\">\n            <span class=\"tag\">User Interviews<\u002Fspan>\n            <span class=\"tag\">Heuristic Eval.<\u002Fspan>\n            <span class=\"tag\">Personas<\u002Fspan>\n            <span class=\"tag\">Journey Mapping<\u002Fspan>\n            <span class=\"tag\">Usability Testing<\u002Fspan>\n            <span class=\"tag\">Stakeholder Workshops<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"skill-block\">\n          <h4>Delivery<\u002Fh4>\n          <div class=\"skill-list\">\n            <span class=\"tag\">Scrum<\u002Fspan>\n            <span class=\"tag\">SAP Commerce<\u002Fspan>\n            <span class=\"tag\">Design Systems<\u002Fspan>\n            <span class=\"tag\">Styleguide<\u002Fspan>\n            <span class=\"tag\">Dev Handoff<\u002Fspan>\n            <span class=\"tag\">Co-design<\u002Fspan>\n            <span class=\"tag\">Component Specs<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EXPERIENCE -->\n  <section class=\"section-sm\">\n    <div class=\"container\">\n      <div class=\"section-head\">\n        <div>\n          <span class=\"eyebrow ev\">/05 · Experience<\u002Fspan>\n          <h2 class=\"h3\">The path so far.<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"exp-list\">\n        <div class=\"exp-row\">\n          <span class=\"year\">2013 – 2016<\u002Fspan>\n          <div class=\"role\">Bachelor<span class=\"co\">HfG Schwäbisch-Gmünd<\u002Fspan><\u002Fdiv>\n          <div class=\"desc\">Interaction Design degree focused on user-centred design, prototyping and visual language. Thesis on workshop methods for industrial software product teams.<\u002Fdiv>\n          <div class=\"loc\">Schwäbisch-Gmünd<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"exp-row\">\n          <span class=\"year\">2016<\u002Fspan>\n          <div class=\"role\">Internships<span class=\"co\">Berlin<\u002Fspan><\u002Fdiv>\n          <div class=\"desc\">Hands-on experience in UI and graphic design at Berlin studios. First projects in digital products, brand identities and web UI.<\u002Fdiv>\n          <div class=\"loc\">Berlin<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"exp-row\">\n          <span class=\"year\">2017<\u002Fspan>\n          <div class=\"role\">UI/UX Design<span class=\"co\">Agency Stellar<\u002Fspan><\u002Fdiv>\n          <div class=\"desc\">UI/UX design for automotive and navigation projects at agency level. Concept and hi-fi screens for in-vehicle systems in direct client collaboration.<\u002Fdiv>\n          <div class=\"loc\">Ulm<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"exp-row\">\n          <span class=\"year\">Oct. 2017 – June 2021<\u002Fspan>\n          <div class=\"role\">UI/UX Designer<span class=\"co\">Scoop&amp;Spoon<\u002Fspan><\u002Fdiv>\n          <div class=\"desc\">UI/UX design for web applications and digital marketing campaigns. End-to-end design across client projects within a cross-functional team.<\u002Fdiv>\n          <div class=\"loc\">Vienna<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"exp-row\">\n          <span class=\"year\">Oct. 2021 – Now<\u002Fspan>\n          <div class=\"role\">UI/UX Designer<span class=\"co\">Sybit GmbH<\u002Fspan><\u002Fdiv>\n          <div class=\"desc\">UX consulting for SAP-based B2B platforms in the industrial sector. Full-cycle design from research to hi-fi handover. Clients include Schunk, Wagner and FANUC.<\u002Fdiv>\n          <div class=\"loc\">Radolfzell<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"exp-row\">\n          <span class=\"year\">2022<\u002Fspan>\n          <div class=\"role\">CPUX-F<span class=\"co\">UXQB®<\u002Fspan><\u002Fdiv>\n          <div class=\"desc\">UXQB® certified as a Certified Professional for Usability and UserExperience Foundation Level, a standardised benchmark for UX methodology and practice.<\u002Fdiv>\n          <div class=\"loc\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n<\u002Fmain>\n\n<footer class=\"foot\">\n  <div class=\"container\">\n    <div class=\"foot-grid\">\n      <div class=\"foot-col\">\n        <p class=\"foot-statement\">Senior UI/UX Designer &amp; Consultant for complex B2B platforms.<\u002Fp>\n        <span class=\"nav-state\" style=\"display:inline-flex\"><span class=\"dot\"><\u002Fspan>Available · 2026<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"foot-col\"><h5>Pages<\u002Fh5><ul>\n        <li><a href=\"index.html\">Home<\u002Fa><\u002Fli><li><a href=\"work.html\">Work<\u002Fa><\u002Fli>\n        <li><a href=\"about.html\">About<\u002Fa><\u002Fli><li><a href=\"contact.html\">Contact<\u002Fa><\u002Fli>\n      <\u002Ful><\u002Fdiv>\n      <div class=\"foot-col\"><h5>Contact<\u002Fh5><ul>\n        <li><a href=\"mailto:johannes@reichard.in\">johannes@reichard.in<\u002Fa><\u002Fli>\n      <\u002Ful><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bot\">\n      <div class=\"left\">\n        <span>© 2026 Johannes Reichard<\u002Fspan>\n      <\u002Fdiv>\n      <span>Last updated · May 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- MOBILE NAV -->\n<div class=\"nav-mobile\" id=\"navMobile\">\n  <nav class=\"nm-links\">\n    <a class=\"nm-link\" href=\"index.html\">Home<\u002Fa>\n    <a class=\"nm-link\" href=\"work.html\">Work<\u002Fa>\n    <a class=\"nm-link\" href=\"about.html\">About<\u002Fa>\n    <a class=\"nm-link\" href=\"contact.html\">Contact<\u002Fa>\n  <\u002Fnav>\n  <div class=\"nm-footer\">\n    <span class=\"nav-state\" style=\"display:inline-flex\"><span class=\"dot\"><\u002Fspan>Available · 2026<\u002Fspan>\n    <a class=\"btn btn-accent\" href=\"contact.html\">Get in touch →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // Reveal animations\n  const revealIO = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); revealIO.unobserve(e.target); } });\n  }, {threshold:0.01, rootMargin:'0px 0px -40px 0px'});\n  requestAnimationFrame(() => { requestAnimationFrame(() => {\n    document.querySelectorAll('.reveal,.text-reveal').forEach(el => {\n      const r = el.getBoundingClientRect();\n      if(r.top < window.innerHeight && r.bottom > 0){ el.classList.add('in'); }\n      else { revealIO.observe(el); }\n    });\n  }); });\n\n  const nav = document.getElementById('nav');\n  document.addEventListener('scroll', () => { nav.classList.toggle('scrolled', window.scrollY > 10); }, {passive:true});\n\n  // Burger menu\n  const burger = document.getElementById('navBurger');\n  const mobileNav = document.getElementById('navMobile');\n  if(burger && mobileNav){\n    burger.addEventListener('click', () => {\n      const open = mobileNav.classList.toggle('open');\n      burger.classList.toggle('open', open);\n      burger.setAttribute('aria-expanded', open);\n      document.body.style.overflow = open ? 'hidden' : '';\n    });\n    // close on link click\n    mobileNav.querySelectorAll('.nm-link').forEach(l => {\n      l.addEventListener('click', () => {\n        mobileNav.classList.remove('open');\n        burger.classList.remove('open');\n        document.body.style.overflow = '';\n      });\n    });\n  }\n<\u002Fscript>\n\n<script src=\"c963d348-9e19-4794-8a08-972c7178329f\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
